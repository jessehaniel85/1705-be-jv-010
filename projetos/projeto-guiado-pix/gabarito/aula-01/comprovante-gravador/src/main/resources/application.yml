server:
  port: 8082

spring:
  application:
    name: comprovante-gravador
  datasource:
    url: jdbc:h2:mem:gravador;DB_CLOSE_DELAY=-1   # base SEGREGADA deste serviço
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

