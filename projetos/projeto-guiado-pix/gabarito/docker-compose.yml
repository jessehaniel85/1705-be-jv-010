# Infra local para o DOCENTE rodar o gabarito com Docker (perfil -Pplano-a-docker).
# NÃO é o ambiente dos alunos — a turma roda em plano-b-jvm (pura-JVM, sem Docker).
#
# Sobe os três brokers nas portas-padrão (o Spring Boot conecta em localhost por default):
#   Redis     6379
#   RabbitMQ  5672  (painel: http://localhost:15672  guest/guest)
#   Kafka     9092
#
# Uso:
#   docker compose up -d                 # sobe os três
#   docker compose up -d redis rabbitmq  # só o que a aula precisa (ver tabela no README)
#   docker compose down -v               # derruba e limpa volumes
#
# Depois, em outra aba, rode os serviços da aula com o perfil Docker:
#   cd aula-05 && mvn -Pplano-a-docker -pl comprovante-gravador spring-boot:run
#
# Quais brokers cada aula precisa:
#   aula-01/02  nenhum (só H2)      aula-03  redis
#   aula-04/05  redis + rabbitmq    aula-06/07  redis + rabbitmq + kafka     aula-08  nenhum (PACT em disco)

name: gabarito-pix

services:
  redis:
    image: redis:7-alpine
    container_name: pix-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: pix-rabbitmq
    ports:
      - "5672:5672"     # AMQP (Spring usa guest/guest em localhost)
      - "15672:15672"   # painel de management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.8.0   # KRaft (sem Zookeeper)
    container_name: pix-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092   # serviços rodando no HOST (IDE/Maven)
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
